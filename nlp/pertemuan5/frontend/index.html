<!DOCTYPE html>
<html>
<head>
    <title>Pencarian Dokumen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Aplikasi Pencarian Dokumen dengan TF-IDF dan Cosine Similarity</h2>

    <form method="POST" class="search-form">
    
    <div class="form-group">
        <label>Query:</label>
        <input type="text" name="query" placeholder="Masukkan kata kunci..." value="{{ query }}" required>
    </div>

    <div class="form-group">
        <label>Metode:</label>
        <select name="method">
            <option value="cosine" {% if method == "cosine" %}selected{% endif %}>Cosine Similarity</option>
            <option value="tfidf" {% if method == "tfidf" %}selected{% endif %}>TF-IDF</option>
        </select>
    </div>

    <div class="form-group button-group">
        <button type="submit">🔍 Cari</button>
    </div>

</form>

    <hr>

    {% if results %}
        <h3>Hasil Pencarian:</h3>
        <table border="1" cellpadding="5">
            <tr>
                <th>Dokumen</th>
                <th>Skor</th>
                <th>Isi</th>
            </tr>

            {% for r in results %}
            <tr>
                <td>{{ r.doc }}</td>
                <td>{{ r.score }}</td>
                <td>{{ r.text }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}

    {% if analysis %}
    <div class="analysis-box">
        <h3>Analisis Hasil Pencarian</h3>
        <p>{{ analysis }}</p>
    </div>
    {% endif %}

</body>
</html>
