<!DOCTYPE html>
<html>
<head>
    <title>Data Users</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 75%;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h2 {
            margin: 0;
            color: #2c3e50;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-add {
            background: #3498db;
        }

        .btn-add:hover {
            background: #2980b9;
        }

        .btn-edit {
            background: #f39c12;
        }

        .btn-delete {
            background: #e74c3c;
        }

        .btn-edit:hover {
            background: #d68910;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .badge {
            background: #2ecc71;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #3498db;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .aksi a {
            margin-right: 5px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="top-bar">
            <h2>📊 Data Users 
                <span class="badge">{{ users|length }}</span>
            </h2>
            <a href="/tambah" class="btn btn-add">+ Tambah</a>
        </div>

        <!-- SEARCH -->
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Cari nama atau email...">
        </div>

        <table id="userTable">
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Aksi</th>
            </tr>

            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td class="aksi">
                    <a href="/edit/{{ user.id }}" class="btn btn-edit">Edit</a>
                    <a href="/hapus/{{ user.id }}" class="btn btn-delete"
                       onclick="return confirm('Yakin hapus data ini?')">Hapus</a>
                </td>
            </tr>
            {% endfor %}

        </table>
<div style="margin-bottom:15px; font-size:14px; color:#555;">
    Terkoneksi ke 🌐 Server: <b>{{ db_info.host }}</b> |
    🗄 Database: <b>{{ db_info.database }}</b>
    </div>
</div>

<!-- SEARCH SCRIPT -->
<script>
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase()
    let rows = document.querySelectorAll("#userTable tr")

    rows.forEach((row, index) => {
        if (index === 0) return
        let text = row.innerText.toLowerCase()
        row.style.display = text.includes(value) ? "" : "none"
    })
})
</script>

</body>
</html>
