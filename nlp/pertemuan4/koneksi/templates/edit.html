<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 40%;
            margin: 80px auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn {
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-update {
            background: #3498db;
            color: white;
        }

        .btn-update:hover {
            background: #2980b9;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #555;
        }

        .back:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h2>✏️ Edit User</h2>

        <form method="POST">
            <label>Nama</label>
            <input type="text" name="name" value="{{ user.name }}" required>

            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" required>

            <button type="submit" class="btn btn-update">Update Data</button>
        </form>

        <a href="/" class="back">← Kembali ke Data</a>

    </div>
</div>

</body>
</html>
